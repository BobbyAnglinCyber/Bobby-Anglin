<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ubuntu Terminal Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="terminal">
    <div class="terminal-header">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
      <span class="title">user@jammy:~</span>
    </div>
    <div class="terminal-body" id="terminal">
      <div class="line">
        <span class="prompt">user@jammy:/home/user$</span>
        <span class="input" id="input" contenteditable="true"></span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
