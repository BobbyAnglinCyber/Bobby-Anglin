<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubuntu Terminal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ubuntu+Mono:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Ubuntu Mono', monospace;
            background: #2d0922;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .terminal-window {
            width: 900px;
            max-width: 100%;
            background: #2d0922;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            border: 1px solid #4a4a4a;
        }

        .title-bar {
            background: linear-gradient(135deg, #3c3c3c, #2b2b2b);
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            position: relative;
            border-bottom: 1px solid #1a1a1a;
        }

        .window-controls {
            display: flex;
            gap: 8px;
        }

        .control-btn {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .close { background: #ff5f57; }
        .minimize { background: #ffbd2e; }
        .maximize { background: #28ca42; }

        .control-btn:hover {
            transform: scale(1.1);
        }

        .window-title {
            color: white;
            font-size: 14px;
            font-weight: 500;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .terminal-body {
            background: #2d0922;
            min-height: 500px;
            padding: 20px;
            color: #ffffff;
            font-size: 14px;
            line-height: 1.4;
            overflow-y: auto;
        }

        .prompt-line {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        .prompt {
            color: #00ff41;
            font-weight: bold;
        }

        .user {
            color: #00ff41;
        }

        .at {
            color: #ffffff;
        }

        .host {
            color: #00ff41;
        }

        .colon {
            color: #ffffff;
        }

        .path {
            color: #5555ff;
            font-weight: bold;
        }

        .dollar {
            color: #ffffff;
        }

        .command-input {
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: 'Ubuntu Mono', monospace;
            font-size: 14px;
            outline: none;
            flex: 1;
            margin-left: 5px;
        }

        .output {
            color: #ffffff;
            margin-bottom: 10px;
            white-space: pre-wrap;
        }

        .error {
            color: #ff6b6b;
        }

        .success {
            color: #51cf66;
        }

        .info {
            color: #74c0fc;
        }

        .cursor {
            background: #ffffff;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .history {
            max-height: 400px;
            overflow-y: auto;
        }

        .file {
            color: #ffffff;
        }

        .directory {
            color: #74c0fc;
            font-weight: bold;
        }

        .executable {
            color: #51cf66;
            font-weight: bold;
        }

        .ascii-art {
            color: #e95420;
            font-weight: bold;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="terminal-window">
        <div class="title-bar">
            <div class="window-controls">
                <button class="control-btn close"></button>
                <button class="control-btn minimize"></button>
                <button class="control-btn maximize"></button>
            </div>
            <div class="window-title">Terminal</div>
        </div>
        
        <div class="terminal-body">
            <div class="history" id="history">
            </div>
            
            <div class="prompt-line">
                <span class="prompt">
                    <span class="user">BobbyAnglin</span><span class="at">@</span><span class="host">Portfolio</span><span class="colon">:</span><span class="path" id="currentPath">/home/portfolio</span><span class="dollar">$</span>
                </span>
                <input type="text" class="command-input" id="commandInput" autofocus>
                <span class="cursor" id="cursor">&nbsp;</span>
            </div>
        </div>
    </div>

    <script>
        const commandInput = document.getElementById('commandInput');
        const history = document.getElementById('history');
        const cursor = document.getElementById('cursor');
        const currentPathElement = document.getElementById('currentPath');
        
        let currentPath = '/home/portfolio';
        let commandHistory = [];
        let historyIndex = -1;
        
        // File system simulation
        const fileSystem = {
            '/home/portfolio': {
                type: 'directory',
                contents: {
                    'about': { type: 'directory', contents: {} },
                    'Projects': { 
                        type: 'directory', 
                        contents: {
                            'Project1': { type: 'directory', contents: {} },
                            'Project2': { type: 'directory', contents: {} }
                        }
                    },
                    'Skills': { 
                        type: 'directory', 
                        contents: {
                            'Skill1': { type: 'directory', contents: {} },
                            'Skill2': { type: 'directory', contents: {} }
                        }
                    },
                    'Experience': { type: 'directory', contents: {} },
                    'Education': { type: 'directory', contents: {} },
                    'Contacts': { type: 'directory', contents: {} }
                }
            },
            '/home/portfolio/about': {
                type: 'directory',
                contents: {}
            },
            '/home/portfolio/Projects': {
                type: 'directory',
                contents: {
                    'Project1': { type: 'directory', contents: {} },
                    'Project2': { type: 'directory', contents: {} }
                }
            },
            '/home/portfolio/Projects/Project1': {
                type: 'directory',
                contents: {}
            },
            '/home/portfolio/Projects/Project2': {
                type: 'directory',
                contents: {}
            },
            '/home/portfolio/Skills': {
                type: 'directory',
                contents: {
                    'Skill1': { type: 'directory', contents: {} },
                    'Skill2': { type: 'directory', contents: {} }
                }
            },
            '/home/portfolio/Skills/Skill1': {
                type: 'directory',
                contents: {}
            },
            '/home/portfolio/Skills/Skill2': {
                type: 'directory',
                contents: {}
            },
            '/home/portfolio/Experience': {
                type: 'directory',
                contents: {}
            },
            '/home/portfolio/Education': {
                type: 'directory',
                contents: {}
            },
            '/home/portfolio/Contacts': {
                type: 'directory',
                contents: {}
            }
        };

        function getCurrentDirectory() {
            return fileSystem[currentPath];
        }

        function updatePromptPath() {
            currentPathElement.textContent = currentPath;
        }

        function addToHistory(content, className = '') {
            const div = document.createElement('div');
            div.className = `output ${className}`;
            div.innerHTML = content;
            history.appendChild(div);
            history.scrollTop = history.scrollHeight;
        }

        function helpCommand() {
            return `Available commands:
  help     - Show this help message
  ls       - List directory contents
  cd       - Change directory (cd <directory>, cd .., cd /)
  pwd      - Print working directory
  whoami   - Display current username
  date     - Show current date and time
  echo     - Display text
  clear    - Clear terminal screen
  neofetch - Display system info with ASCII art`;
        }

        function lsCommand(args) {
            const currentDir = getCurrentDirectory();
            if (!currentDir) return 'Directory not found';
            
            let output = '';
            for (const [name, item] of Object.entries(currentDir.contents)) {
                const className = item.type === 'directory' ? 'directory' : 
                                item.type === 'executable' ? 'executable' : 'file';
                output += `<span class="${className}">${name}</span>  `;
            }
            return output || 'Directory is empty';
        }

        function cdCommand(args) {
            if (args.length === 0) {
                currentPath = '/home/portfolio';
                updatePromptPath();
                return '';
            }
            
            const targetPath = args[0];
            let newPath;
            
            if (targetPath === '..') {
                const pathParts = currentPath.split('/').filter(p => p);
                if (pathParts.length > 2) {
                    pathParts.pop();
                    newPath = '/' + pathParts.join('/');
                } else {
                    newPath = '/home/portfolio';
                }
            } else if (targetPath === '/') {
                newPath = '/home/portfolio';
            } else if (targetPath.startsWith('/')) {
                if (targetPath.startsWith('/home/portfolio')) {
                    newPath = targetPath;
                } else {
                    return `cd: ${targetPath}: No such file or directory`;
                }
            } else {
                if (currentPath.endsWith('/')) {
                    newPath = currentPath + targetPath;
                } else {
                    newPath = currentPath + '/' + targetPath;
                }
            }
            
            if (fileSystem[newPath] && fileSystem[newPath].type === 'directory') {
                currentPath = newPath;
                updatePromptPath();
                return '';
            } else {
                const currentDir = getCurrentDirectory();
                if (currentDir && currentDir.contents && currentDir.contents[targetPath] && 
                    currentDir.contents[targetPath].type === 'directory') {
                    currentPath = newPath;
                    updatePromptPath();
                    return '';
                } else {
                    return `cd: ${targetPath}: No such file or directory`;
                }
            }
        }

        function neofetchCommand() {
            return `<span class="ascii-art">                          ./+o+-       
                  yyyyy- -yyyyyy+      
               ://+//////-yyyyyyo      
           .++ .:/++++++/-.+sss/\`      
         .:++o:  /++++++++/:--:/-      
        o:+o+:++.\`..\`\`\`.-/oo+++++/     
       .:+o:+o/.          \`+sssoo+/    
  .++/+:+oo+o:\`             /sssooo.   
 /+++//+:\`oo+o               /::--:.   
 \+/+o+++\`o++o               ++////.   
  .++.o+++oo+:\`             /dddhhh.   
       .+.o+oo:.          \`oddhhhh+    
        \+.++o+o\`\`-\`\`\`\`.:ohdhhhhh+     
         \`:o+++ \`ohhhhhhhhyo++os:      
           .o:\`.syhhhhhhh/.oo++o\`      
               /osyyyyyyo++ooo+++/     
                   \`\`\`\` +oo+++o\:     
                        \`oo++.       </span>

<span class="user">BobbyAnglin</span>@<span class="host">Portfolio</span>
<span style="color: #e95420;">-----------</span>
<span style="color: #74c0fc;">OS:</span> Ubuntu 22.04.3 LTS x86_64
<span style="color: #74c0fc;">Kernel:</span> 5.19.0-46-generic
<span style="color: #74c0fc;">Uptime:</span> 2 hours, 15 mins
<span style="color: #74c0fc;">Shell:</span> bash 5.1.16
<span style="color: #74c0fc;">Terminal:</span> gnome-terminal
<span style="color: #74c0fc;">CPU:</span> Intel i7-12700K (16) @ 3.600GHz
<span style="color: #74c0fc;">Memory:</span> 931MiB / 3949MiB`;
        }

        function processCommand(input) {
            const parts = input.trim().split(' ');
            const cmd = parts[0].toLowerCase();
            const args = parts.slice(1);
            
            // Add command to history
            addToHistory(`<span class="user">BobbyAnglin</span><span class="at">@</span><span class="host">Portfolio</span><span class="colon">:</span><span class="path">${currentPath}</span><span class="dollar">$</span> ${input}`);
            
            if (cmd === '') return;
            
            let output = '';
            
            switch(cmd) {
                case 'help':
                    output = helpCommand();
                    break;
                case 'ls':
                    output = lsCommand(args);
                    break;
                case 'cd':
                    output = cdCommand(args);
                    break;
                case 'pwd':
                    output = currentPath;
                    break;
                case 'whoami':
                    output = 'BobbyAnglin';
                    break;
                case 'date':
                    output = new Date().toString();
                    break;
                case 'echo':
                    output = args.join(' ');
                    break;
                case 'clear':
                    history.innerHTML = '';
                    output = '';
                    break;
                case 'neofetch':
                    output = neofetchCommand();
                    break;
                default:
                    output = `Command '${cmd}' not found. Type 'help' for available commands.`;
                    addToHistory(output, 'error');
                    break;
            }
            
            if (output && cmd !== 'clear') {
                addToHistory(output);
            }
            
            commandHistory.push(input);
            historyIndex = commandHistory.length;
        }

        commandInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const command = commandInput.value;
                processCommand(command);
                commandInput.value = '';
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    commandInput.value = commandHistory[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    commandInput.value = commandHistory[historyIndex];
                } else {
                    historyIndex = commandHistory.length;
                    commandInput.value = '';
                }
            } else if (e.key === 'Tab') {
                e.preventDefault();
                const currentInput = commandInput.value;
                const commands = ['help', 'ls', 'cd', 'pwd', 'whoami', 'date', 'echo', 'clear', 'neofetch'];
                const possibleCommands = commands.filter(cmd => 
                    cmd.startsWith(currentInput)
                );
                if (possibleCommands.length === 1) {
                    commandInput.value = possibleCommands[0];
                }
            }
        });

        // Keep focus on input
        document.addEventListener('click', (e) => {
            if (e.target.closest('.terminal-body')) {
                commandInput.focus();
            }
        });

        // Blinking cursor
        setInterval(() => {
            cursor.style.opacity = cursor.style.opacity === '0' ? '1' : '0';
        }, 500);

        // Window controls functionality
        document.querySelector('.close').addEventListener('click', () => {
            if (confirm('Close terminal?')) {
                document.querySelector('.terminal-window').style.display = 'none';
            }
        });

        document.querySelector('.minimize').addEventListener('click', () => {
            document.querySelector('.terminal-window').style.transform = 'scale(0.1)';
            setTimeout(() => {
                document.querySelector('.terminal-window').style.transform = 'scale(1)';
            }, 1000);
        });

        document.querySelector('.maximize').addEventListener('click', () => {
            const terminal = document.querySelector('.terminal-window');
            terminal.style.width = terminal.style.width === '100vw' ? '900px' : '100vw';
            terminal.style.height = terminal.style.height === '100vh' ? 'auto' : '100vh';
            terminal.style.borderRadius = terminal.style.width === '100vw' ? '0' : '12px';
        });
    </script>
</body>
</html>
